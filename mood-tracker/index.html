 <!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood and Activity Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Mood and Activity Tracker</h1>

        <section id="entry-form">
            <h2>Today's Entry</h2>
            <div id="moodPicker" class="mood-picker" aria-label="Choose a mood">
                <button type="button" data-mood="happy" aria-label="Happy">😺</button>
                <button type="button" data-mood="good" aria-label="Good">🙂</button>
                <button type="button" data-mood="neutral" aria-label="Neutral">😐</button>
                <button type="button" data-mood="sad" aria-label="Sad">😢</button>
                <button type="button" data-mood="stressed" aria-label="Stressed">🙀</button>
                
            </div>

            <label for="activities">Activities (1-3 lines):</label>

            <textarea id="activities" placeholder="Enter 1-3 activities (one per line)" rows="4"></textarea>

            <button id="save-btn" type="button">Save Entry</button>
            
        </section>

        <section id="history">
            <h2>History</h2>

            <div id="tools"> 
                <label for="searchInput">Search activities</label>
                <input id="searchInput" type="text" placeholder="Type to search"/>

                <button id="clearAllBtn" type="button">Clear All</button>
                <button id="darkModeBtn" type="button">Dark Mode</button>
            </div> <!-- Page 2 upgrade-->

            <div id="filter" aria-label="Filter entries by mood">
                <button type="button" data-filter="">All</button> 
                <button type="button" data-filter="happy">Happy 😊</button>
                <button type="button" data-filter="good">Good 🙂</button>
                <button type="button" data-filter="neutral">Neutral 😐</button>
                <button type="button" data-filter="sad">Sad 😢</button>
                <button type="button" data-filter="stressed">Stressed 😰</button>

            </div>


            <div id="stats"></div> 
            <div id="weekly" class="weekly"></div> <!-- Page 2 upgrade-->
            <div id="entries-list"></div>
                  
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
